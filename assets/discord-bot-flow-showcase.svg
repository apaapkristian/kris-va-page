<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
<defs><radialGradient id="g"><stop stop-color="#0e2b42"/><stop offset="1" stop-color="#040814"/></radialGradient><pattern id="p" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0v28" fill="none" stroke="#183149" opacity=".55"/><circle r="1.2" fill="#2d5872"/></pattern><filter id="s"><feDropShadow dx="0" dy="16" stdDeviation="16" flood-opacity=".45"/></filter><linearGradient id="b" x1="0" x2="1"><stop stop-color="#32d7ff"/><stop offset="1" stop-color="#5865f2"/></linearGradient><linearGradient id="ok" x1="0" x2="1"><stop stop-color="#4cf1a8"/><stop offset="1" stop-color="#14c768"/></linearGradient><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2l8 4-8 4z" fill="#38d9ff"/></marker><style>.t{font:800 52px Inter,Arial;fill:white}.st{font:500 20px Inter,Arial;fill:#a5cbe7}.h{font:800 20px Inter,Arial;fill:white}.m{font:600 14px Consolas,monospace;fill:#b9d7ec}.x{font:600 13px Inter,Arial;fill:#82a0b8}.card{fill:#091524;stroke:#24445f;stroke-width:1.2;filter:url(#s)}.node{fill:#0d1a2a;stroke:#2c536e;stroke-width:1.4;filter:url(#s)}.flow{fill:none;stroke:#38d9ff;stroke-width:4;stroke-dasharray:12 18;marker-end:url(#a);animation:dash 2.6s linear infinite}.flow2{stroke:#45f1a3;animation-delay:-1s}@keyframes dash{to{stroke-dashoffset:-120}}</style></defs>
