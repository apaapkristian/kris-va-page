<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
<title id="title">n8n API Operations Hub</title>
<desc id="desc">Animated SVG showing an n8n-style API operations hub with webhook triggers, API requests, data routing, validation, and destination services.</desc>
<style>
  :root{--bg:#07111d;--panel:#0d1a2a;--panel2:#0b1524;--line:#24d6ff;--green:#42f5a7;--purple:#9c6cff;--orange:#ffb454;--red:#ff5d73;--text:#eaf7ff;--muted:#91a9bd;--grid:#18324a;}
  .bg{fill:var(--bg)} .panel{fill:var(--panel);stroke:#1e3a55;stroke-width:1.2} .panel2{fill:var(--panel2);stroke:#223b55;stroke-width:1}
  .title{font:800 42px Inter,Arial,sans-serif;fill:var(--text)} .sub{font:500 17px Inter,Arial,sans-serif;fill:#a9d7ef}.small{font:600 13px Inter,Arial,sans-serif;fill:var(--muted)}
  .label{font:700 15px Inter,Arial,sans-serif;fill:var(--text)} .mono{font:600 12px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#bfe9ff}
  .badge{fill:#102942;stroke:#285b7e;stroke-width:1}.node{fill:#0f2033;stroke:#2d5c7a;stroke-width:1.4}.nodeTitle{font:700 14px Inter,Arial,sans-serif;fill:#fff}.nodeSub{font:500 11px Inter,Arial,sans-serif;fill:#90a9bc}
  .blink{animation:blink 1.5s ease-in-out infinite}.dash{stroke-dasharray:10 12;animation:dash 8s linear infinite}.dashfast{stroke-dasharray:8 10;animation:dash 4s linear infinite}.glow{filter:url(#glow)}
  @keyframes dash{to{stroke-dashoffset:-220}}@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
  .packet{offset-rotate:0deg;animation:move 5.5s linear infinite}.p2{animation-delay:-1.4s}.p3{animation-delay:-2.8s}.p4{animation-delay:-4s}@keyframes move{from{offset-distance:0%}to{offset-distance:100%}}
</style>
<defs>
  <filter id="glow"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <linearGradient id="heroGrad" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#0d2a44"/><stop offset="1" stop-color="#06111e"/></linearGradient>
  <linearGradient id="greenGrad" x1="0" x2="1"><stop stop-color="#2affb6"/><stop offset="1" stop-color="#27c6ff"/></linearGradient>
  <linearGradient id="purpleGrad" x1="0" x2="1"><stop stop-color="#a56cff"/><stop offset="1" stop-color="#1cc8ff"/></linearGradient>
  <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" fill="none" stroke="#17304a" stroke-width=".7" opacity=".55"/><circle cx="1" cy="1" r="1" fill="#245271" opacity=".45"/></pattern>
  <path id="mainPath" d="M205 365 C300 365 328 250 435 250 C540 250 555 360 648 360 C752 360 775 245 895 245 C990 245 1018 345 1080 345"/>
</defs>
<rect class="bg" width="1200" height="720"/><rect width="1200" height="720" fill="url(#grid)" opacity=".75"/><circle cx="970" cy="110" r="250" fill="#0b72ff" opacity=".08"/><circle cx="210" cy="610" r="280" fill="#23ffc5" opacity=".07"/>

<!-- Header -->
<g transform="translate(58 48)">
  <rect width="1084" height="90" rx="24" fill="url(#heroGrad)" stroke="#1f4665"/>
  <text x="32" y="45" class="title">n8n API Operations Hub</text>
  <text x="34" y="73" class="sub">Webhook intake, API requests, data validation, routing, retries, and multi-app delivery.</text>
  <g transform="translate(850 25)"><rect class="badge" width="190" height="40" rx="20"/><circle cx="26" cy="20" r="7" fill="#42f5a7" class="blink"/><text x="45" y="25" class="small">WORKFLOWS ACTIVE</text></g>
</g>

<!-- Main flow panel -->
<g transform="translate(58 165)">
  <rect class="panel" width="1084" height="355" rx="28"/>
  <text x="32" y="42" class="label">Live API Workflow</text>
  <text x="32" y="66" class="small">A simple operations center for triggers, transformation, routing, and final actions.</text>
  <use href="#mainPath" fill="none" stroke="#1d405b" stroke-width="8" opacity=".8"/>
  <use href="#mainPath" fill="none" stroke="url(#greenGrad)" stroke-width="3" class="dash glow"/>
  <circle r="8" fill="#24d6ff" class="packet glow" style="offset-path:path('M205 365 C300 365 328 250 435 250 C540 250 555 360 648 360 C752 360 775 245 895 245 C990 245 1018 345 1080 345')"/>
  <circle r="6" fill="#42f5a7" class="packet p2 glow" style="offset-path:path('M205 365 C300 365 328 250 435 250 C540 250 555 360 648 360 C752 360 775 245 895 245 C990 245 1018 345 1080 345')"/>
  <circle r="5" fill="#9c6cff" class="packet p3 glow" style="offset-path:path('M205 365 C300 365 328 250 435 250 C540 250 555 360 648 360 C752 360 775 245 895 245 C990 245 1018 345 1080 345')"/>
  <circle r="5" fill="#ffb454" class="packet p4 glow" style="offset-path:path('M205 365 C300 365 328 250 435 250 C540 250 555 360 648 360 C752 360 775 245 895 245 C990 245 1018 345 1080 345')"/>

  <!-- Nodes aligned to flow path -->
  <g transform="translate(48 248)"><rect class="node" width="142" height="118" rx="18"/><circle cx="35" cy="34" r="18" fill="#123b5e" stroke="#27c6ff"/><text x="28" y="40" font-size="22" fill="#27c6ff">⚡</text><text x="25" y="76" class="nodeTitle">Webhook</text><text x="25" y="96" class="nodeSub">POST /event</text></g>
  <g transform="translate(286 148)"><rect class="node" width="154" height="126" rx="18"/><circle cx="38" cy="36" r="18" fill="#2a1a42" stroke="#9c6cff"/><text x="27" y="42" font-size="22" fill="#9c6cff">API</text><text x="25" y="78" class="nodeTitle">HTTP Request</text><text x="25" y="99" class="nodeSub">Fetch source data</text></g>
  <g transform="translate(528 248)"><rect class="node" width="154" height="126" rx="18"/><circle cx="38" cy="36" r="18" fill="#233914" stroke="#42f5a7"/><text x="29" y="42" font-size="23" fill="#42f5a7">✓</text><text x="25" y="78" class="nodeTitle">Validate</text><text x="25" y="99" class="nodeSub">Clean + match fields</text></g>
  <g transform="translate(748 148)"><rect class="node" width="154" height="126" rx="18"/><circle cx="38" cy="36" r="18" fill="#3a2813" stroke="#ffb454"/><text x="30" y="42" font-size="22" fill="#ffb454">IF</text><text x="25" y="78" class="nodeTitle">Router</text><text x="25" y="99" class="nodeSub">Branch by status</text></g>
  <g transform="translate(930 248)"><rect class="node" width="106" height="118" rx="18"/><circle cx="53" cy="34" r="18" fill="#132f28" stroke="#42f5a7"/><text x="45" y="40" font-size="20" fill="#42f5a7">↗</text><text x="28" y="76" class="nodeTitle">Sync</text><text x="22" y="96" class="nodeSub">Apps updated</text></g>
</g>

<!-- bottom panels -->
<g transform="translate(58 545)">
  <g><rect class="panel2" width="330" height="125" rx="20"/><text x="22" y="31" class="label">Run Status</text><text x="22" y="61" class="mono">200 OK · 1,248 executions</text><text x="22" y="87" class="mono">Retries: 3 · Errors: 0.4%</text><path d="M220 80 C245 42 277 70 309 44" fill="none" stroke="#42f5a7" stroke-width="3" class="dashfast"/></g>
  <g transform="translate(377 0)"><rect class="panel2" width="330" height="125" rx="20"/><text x="22" y="31" class="label">Connected Operations</text><text x="22" y="61" class="mono">CRM → Sheets → Email → Discord</text><text x="22" y="87" class="mono">Webhooks · REST APIs · OAuth</text><circle cx="276" cy="62" r="28" fill="none" stroke="#27c6ff" stroke-width="5" stroke-dasharray="35 18"/></g>
  <g transform="translate(754 0)"><rect class="panel2" width="330" height="125" rx="20"/><text x="22" y="31" class="label">Data Guardrails</text><text x="22" y="61" class="mono">Deduplicate · Format · Audit logs</text><text x="22" y="87" class="mono">Fallback actions enabled</text><rect x="238" y="40" width="56" height="56" rx="14" fill="#112941" stroke="#9c6cff"/><text x="255" y="76" font-size="25" fill="#9c6cff">{}</text></g>
</g>
</svg>
