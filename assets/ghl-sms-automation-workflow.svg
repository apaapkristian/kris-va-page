<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
<defs>
  <radialGradient id="bg" cx="50%" cy="45%" r="75%"><stop offset="0" stop-color="#0e3551"/><stop offset="1" stop-color="#040814"/></radialGradient>
  <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0v28" fill="none" stroke="#183149" opacity=".52"/><circle r="1.2" fill="#2d5872" opacity=".8"/></pattern>
  <filter id="shadow"><feDropShadow dx="0" dy="16" stdDeviation="16" flood-opacity=".45"/></filter>
  <linearGradient id="blue" x1="0" x2="1"><stop stop-color="#32d7ff"/><stop offset="1" stop-color="#2368ff"/></linearGradient>
  <linearGradient id="green" x1="0" x2="1"><stop stop-color="#4cf1a8"/><stop offset="1" stop-color="#12c878"/></linearGradient>
  <linearGradient id="gold" x1="0" x2="1"><stop stop-color="#ffd166"/><stop offset="1" stop-color="#ff8a3d"/></linearGradient>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2l8 4-8 4z" fill="#38d9ff"/></marker>
  <style>
    .title{font:800 52px Inter,Arial;fill:white}.sub{font:500 20px Inter,Arial;fill:#a5cbe7}.h{font:800 20px Inter,Arial;fill:white}.small{font:600 13px Inter,Arial;fill:#84a4be}.mono{font:600 14px Consolas,monospace;fill:#b9d7ec}.card{fill:#091524;stroke:#24445f;stroke-width:1.2;filter:url(#shadow)}.node{fill:#0d1a2a;stroke:#2c536e;stroke-width:1.4;filter:url(#shadow)}.tag{fill:#102033;stroke:#345b77}.flow{fill:none;stroke:#38d9ff;stroke-width:4;stroke-dasharray:12 18;marker-end:url(#arrow);animation:dash 2.6s linear infinite}.flow2{stroke:#45f1a3;animation-delay:-1s}.flow3{stroke:#ffb454;animation-delay:-1.7s}@keyframes dash{to{stroke-dashoffset:-120}}
  </style>
</defs>
<rect width="1400" height="820" fill="url(#bg)"/><rect width="1400" height="820" fill="url(#grid)" opacity=".82"/>
<circle cx="1080" cy="265" r="300" fill="#0fbf9b" opacity=".08"/><circle cx="310" cy="610" r="240" fill="#2368ff" opacity=".12"/>
<text x="70" y="105" class="title">GHL + SMS Automation Workflow</text>
<text x="72" y="142" class="sub">Lead capture, CRM updates, consent checks, SMS follow-ups, replies, and booking actions.</text>

