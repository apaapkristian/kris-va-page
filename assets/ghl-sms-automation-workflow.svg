  <rect x="28" y="74" width="280" height="24" rx="12" fill="#102033"/><rect x="28" y="74" width="230" height="24" rx="12" fill="url(#blue)" opacity=".9"/><text x="38" y="91" class="small" fill="#fff">New Lead</text><text x="270" y="91" class="mono">128</text>
  <rect x="28" y="114" width="280" height="24" rx="12" fill="#102033"/><rect x="28" y="114" width="170" height="24" rx="12" fill="url(#green)" opacity=".9"/><text x="38" y="131" class="small" fill="#fff">Contacted</text><text x="270" y="131" class="mono">75</text>
  <rect x="28" y="154" width="280" height="24" rx="12" fill="#102033"/><rect x="28" y="154" width="105" height="24" rx="12" fill="url(#gold)" opacity=".9"/><text x="38" y="171" class="small" fill="#fff">Qualified</text><text x="270" y="171" class="mono">42</text>
  <text x="28" y="210" class="mono">sync: contact updated</text>
</g>

<g transform="translate(535 475)">
  <rect class="card" width="335" height="235" rx="24"/>
  <text x="28" y="45" class="h">SMS Conversation</text>
  <rect x="28" y="72" width="220" height="42" rx="18" fill="#102033" stroke="#345b77"/><text x="46" y="98" class="mono">Hi, want help getting set up?</text>
