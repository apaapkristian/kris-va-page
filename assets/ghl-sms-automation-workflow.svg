  <circle cx="296" cy="42" r="8" fill="#4cf1a8"><animate attributeName="opacity" values="1;.25;1" dur="1.4s" repeatCount="indefinite"/></circle>
</g>

<g transform="translate(980 475)">
  <rect class="card" width="335" height="235" rx="24"/>
  <text x="28" y="45" class="h">Automation Rules</text>
  <rect x="28" y="74" width="280" height="38" rx="12" class="tag"/><text x="48" y="99" class="mono">IF reply contains "yes"</text>
  <rect x="28" y="124" width="280" height="38" rx="12" class="tag"/><text x="48" y="149" class="mono">THEN move pipeline stage</text>
  <rect x="28" y="174" width="280" height="38" rx="12" class="tag"/><text x="48" y="199" class="mono">CREATE task + notify team</text>
</g>

