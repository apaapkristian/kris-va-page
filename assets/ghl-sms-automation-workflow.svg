  <circle cx="56" cy="60" r="31" fill="none" stroke="url(#green)" stroke-width="7"/>
  <path d="M43 59h26M56 46v26" stroke="#4cf1a8" stroke-width="5" stroke-linecap="round"/>
  <text x="100" y="55" class="h">Result</text><text x="100" y="82" class="small">book / task / tag</text>
  <text x="24" y="122" class="mono">action.created</text>
</g>

