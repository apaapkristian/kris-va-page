<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Automation and Backend Systems Showcase</title>
  <desc id="desc">Animated portfolio illustration showing workflow automation, Discord bot logs, CRM automation, cloud infrastructure, Google Sheets sync, API routing, code editor and system monitoring.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050a12"/>
      <stop offset="0.52" stop-color="#071623"/>
      <stop offset="1" stop-color="#0d2634"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#a9c8dc" stop-opacity="0.85"/>
      <stop offset="0.45" stop-color="#2ea8ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2ea8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#41f1a8" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#41f1a8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111b27"/>
      <stop offset="1" stop-color="#07111c"/>
    </linearGradient>
    <linearGradient id="panelLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9fbfd"/>
      <stop offset="1" stop-color="#e9f3f8"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#a9c8dc" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#a9c8dc" opacity="0.20"/>
    </pattern>
    <style>
      .title{font:800 44px Inter,Segoe UI,Arial,sans-serif;letter-spacing:-1px;fill:#f6fbff}.sub{font:500 17px Inter,Segoe UI,Arial,sans-serif;fill:#b9d4e6}.tiny{font:600 12px Inter,Segoe UI,Arial,sans-serif;fill:#8fb4ca}.label{font:800 15px Inter,Segoe UI,Arial,sans-serif;fill:#eef8ff}.body{font:500 13px Inter,Segoe UI,Arial,sans-serif;fill:#c6d8e4}.muted{fill:#83a0b2}.accent{fill:#a9c8dc}.green{fill:#41f1a8}.blue{fill:#2ea8ff}.red{fill:#ff5b6e}.orange{fill:#ffb557}.card{filter:url(#shadow)}.stroke{stroke:#a9c8dc;stroke-opacity:.24}.wire{fill:none;stroke:#a9c8dc;stroke-width:2;stroke-opacity:.38}.flow{fill:none;stroke:#41f1a8;stroke-width:3;stroke-linecap:round;stroke-dasharray:8 18;animation:dash 5s linear infinite}.flow2{fill:none;stroke:#2ea8ff;stroke-width:3;stroke-linecap:round;stroke-dasharray:10 22;animation:dash 7s linear infinite}.nodeGlow{filter:url(#softGlow)}@keyframes dash{to{stroke-dashoffset:-260}}
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <rect width="1400" height="900" fill="url(#grid)"/>
  <rect width="1400" height="900" fill="url(#dots)" opacity=".7"/>
  <circle cx="262" cy="188" r="260" fill="url(#glowBlue)" opacity=".45"/>
  <circle cx="1080" cy="680" r="310" fill="url(#glowGreen)" opacity=".22"/>
  <circle cx="1130" cy="135" r="210" fill="url(#glowBlue)" opacity=".22"/>

  <g transform="translate(70 64)">
    <text class="title" x="0" y="0">Automation Backend Systems</text>
    <text class="sub" x="2" y="34">Live workflow orchestration, bot infrastructure, API sync, CRM automations, and cloud monitoring.</text>
    <g transform="translate(0 64)">
      <rect x="0" y="0" width="146" height="36" rx="18" fill="#a9c8dc" opacity=".16" stroke="#a9c8dc" stroke-opacity=".35"/>
      <text class="tiny" x="19" y="23">n8n Workflows</text>
      <rect x="162" y="0" width="122" height="36" rx="18" fill="#41f1a8" opacity=".12" stroke="#41f1a8" stroke-opacity=".34"/>
      <text class="tiny" x="184" y="23">Discord Bots</text>
      <rect x="300" y="0" width="112" height="36" rx="18" fill="#2ea8ff" opacity=".13" stroke="#2ea8ff" stroke-opacity=".32"/>
      <text class="tiny" x="323" y="23">API Sync</text>
      <rect x="428" y="0" width="128" height="36" rx="18" fill="#ffb557" opacity=".12" stroke="#ffb557" stroke-opacity=".32"/>
      <text class="tiny" x="450" y="23">Cloud Ops</text>
    </g>
  </g>

  <!-- Central Orchestrator -->
  <g transform="translate(580 315)">
    <circle cx="120" cy="120" r="118" fill="#07101b" stroke="#a9c8dc" stroke-opacity=".26" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="120" cy="120" r="82" fill="#0c2030" stroke="#2ea8ff" stroke-opacity=".45"/>
    <circle cx="120" cy="120" r="148" fill="none" stroke="#a9c8dc" stroke-opacity=".13"/>
    <circle cx="120" cy="120" r="52" fill="#0b1723" stroke="#41f1a8" stroke-width="2" opacity=".95"/>
    <path d="M92 121h28l-12 37 43-54h-30l12-34z" fill="#a9c8dc"/>
    <text class="label" x="120" y="214" text-anchor="middle">Workflow Hub</text>
    <text class="tiny" x="120" y="234" text-anchor="middle">webhooks • APIs • bots • CRM</text>
  </g>

  <!-- wires -->
  <path class="flow" d="M383 280 C480 260,522 322,612 386"/>
  <path class="flow2" d="M450 625 C520 565,570 540,627 493"/>
  <path class="flow" d="M770 394 C875 310,930 255,1025 218"/>
  <path class="flow2" d="M782 488 C890 560,940 624,1045 687"/>
  <path class="wire" d="M490 165 C560 250,600 292,662 335"/>
  <path class="wire" d="M861 146 C835 240,795 298,742 342"/>
  <path class="wire" d="M340 730 C470 675,545 580,627 512"/>
  <path class="wire" d="M1095 720 C982 648,875 570,782 497"/>

  <!-- Card 1: workflow automation -->
  <g class="card" transform="translate(78 186)">
    <rect width="410" height="235" rx="22" fill="url(#panel)" stroke="#a9c8dc" stroke-opacity=".20"/>
    <rect x="0" y="0" width="410" height="44" rx="22" fill="#0d1f2d"/>
    <circle cx="28" cy="22" r="6" fill="#ff5b6e"/><circle cx="50" cy="22" r="6" fill="#ffb557"/><circle cx="72" cy="22" r="6" fill="#41f1a8"/>
    <text class="label" x="104" y="27">Visual Workflow Automation</text>
    <g transform="translate(38 78)">
      <rect x="0" y="0" width="64" height="52" rx="14" fill="#101d2a" stroke="#a9c8dc" stroke-opacity=".28"/>
      <text x="32" y="31" text-anchor="middle" font-size="26" fill="#41f1a8">↻</text>
      <rect x="108" y="0" width="64" height="52" rx="14" fill="#101d2a" stroke="#a9c8dc" stroke-opacity=".28"/>
      <text x="140" y="31" text-anchor="middle" font-size="26" fill="#ffb557">{}</text>
      <rect x="216" y="0" width="64" height="52" rx="14" fill="#101d2a" stroke="#a9c8dc" stroke-opacity=".28"/>
      <text x="248" y="31" text-anchor="middle" font-size="24" fill="#2ea8ff">API</text>
      <rect x="324" y="0" width="64" height="52" rx="14" fill="#101d2a" stroke="#a9c8dc" stroke-opacity=".28"/>
      <text x="356" y="31" text-anchor="middle" font-size="24" fill="#41f1a8">✓</text>
      <path class="flow" d="M65 26H105M173 26H213M281 26H321"/>
      <text class="body" x="0" y="96">Scheduled triggers, cleanup logic, status filters,</text>
      <text class="body" x="0" y="119">merge nodes and subscriber updates in one flow.</text>
    </g>
  </g>

  <!-- Card 2: discord journal logs -->
  <g class="card" transform="translate(68 475)">
    <rect width="420" height="285" rx="22" fill="url(#panel)" stroke="#a9c8dc" stroke-opacity=".20"/>
    <rect x="22" y="24" width="52" height="52" rx="26" fill="#5865f2" opacity=".9"/>
    <text x="48" y="58" text-anchor="middle" font-size="28" fill="white">☁</text>
    <text class="label" x="92" y="44">Discord Bot Journal</text>
    <text class="tiny" x="92" y="65">membership events • errors • sync logs</text>
    <g transform="translate(24 96)">
      <rect width="372" height="68" rx="12" fill="#121c27" stroke="#ff5b6e" stroke-opacity=".45"/>
      <rect x="0" y="0" width="5" height="68" rx="3" fill="#ff5b6e"/>
      <text class="label" x="20" y="25">Payment failed</text><text class="body" x="20" y="48">Status: Past Due • Action: log + notify</text>
      <rect y="88" width="372" height="68" rx="12" fill="#121c27" stroke="#41f1a8" stroke-opacity=".45"/>
      <rect x="0" y="88" width="5" height="68" rx="3" fill="#41f1a8"/>
      <text class="label" x="20" y="113">Membership purchased</text><text class="body" x="20" y="136">Status: Trialing • Action: map account</text>
    </g>
  </g>

  <!-- Card 3: CRM/Kit/GHL -->
  <g class="card" transform="translate(920 120)">
    <rect width="402" height="265" rx="22" fill="url(#panelLight)" stroke="#a9c8dc" stroke-opacity=".36"/>
    <text x="30" y="46" font-family="Inter,Segoe UI,Arial" font-size="24" font-weight="900" fill="#071623">CRM + Email Automations</text>
    <text x="30" y="72" font-family="Inter,Segoe UI,Arial" font-size="13" font-weight="600" fill="#66879a">subscriber segments • opt-ins • nurture campaigns</text>
    <g transform="translate(32 105)">
      <rect width="96" height="88" rx="16" fill="#fff" stroke="#c9dae5"/>
      <text x="48" y="33" text-anchor="middle" font-size="25" fill="#ff8b2d">✉</text>
      <text x="48" y="61" text-anchor="middle" font-size="12" font-weight="800" fill="#334">Opt-In</text>
      <rect x="122" width="96" height="88" rx="16" fill="#fff" stroke="#c9dae5"/>
      <text x="170" y="33" text-anchor="middle" font-size="25" fill="#2ea8ff">⚙</text>
      <text x="170" y="61" text-anchor="middle" font-size="12" font-weight="800" fill="#334">Segment</text>
      <rect x="244" width="96" height="88" rx="16" fill="#fff" stroke="#c9dae5"/>
      <text x="292" y="33" text-anchor="middle" font-size="25" fill="#41b978">✓</text>
      <text x="292" y="61" text-anchor="middle" font-size="12" font-weight="800" fill="#334">Update</text>
      <path class="flow2" d="M98 44H120M220 44H242"/>
    </g>
    <g transform="translate(30 218)"><rect width="88" height="18" rx="9" fill="#41f1a8" opacity=".22"/><text class="tiny" x="13" y="13" fill="#0d5139">Active</text><rect x="103" width="154" height="18" rx="9" fill="#a9c8dc" opacity=".24"/><text class="tiny" x="118" y="13" fill="#345">4,259 subscribers synced</text></g>
  </g>

  <!-- Card 4: Cloud monitor -->
  <g class="card" transform="translate(905 443)">
    <rect width="415" height="310" rx="22" fill="url(#panel)" stroke="#a9c8dc" stroke-opacity=".20"/>
    <text class="label" x="30" y="44">Cloud Infrastructure Monitor</text>
    <text class="tiny" x="30" y="66">Oracle server • workers • database • uptime</text>
    <g transform="translate(30 96)">
      <rect width="76" height="58" rx="12" fill="#121f2c" stroke="#a9c8dc" stroke-opacity=".18"/><text class="tiny" x="14" y="23">CPU</text><text class="label green" x="14" y="45">24%</text>
      <rect x="92" width="76" height="58" rx="12" fill="#121f2c" stroke="#a9c8dc" stroke-opacity=".18"/><text class="tiny" x="106" y="23">RAM</text><text class="label blue" x="106" y="45">58%</text>
      <rect x="184" width="76" height="58" rx="12" fill="#121f2c" stroke="#a9c8dc" stroke-opacity=".18"/><text class="tiny" x="198" y="23">Disk</text><text class="label orange" x="198" y="45">42%</text>
      <rect x="276" width="76" height="58" rx="12" fill="#121f2c" stroke="#a9c8dc" stroke-opacity=".18"/><text class="tiny" x="290" y="23">Net</text><text class="label" x="290" y="45">1.2G</text>
      <rect y="88" width="352" height="112" rx="16" fill="#101a25" stroke="#a9c8dc" stroke-opacity=".16"/>
      <text class="body" x="18" y="116">● Bot Service</text><text class="green" x="265" y="116" font-size="13" font-weight="800">Running</text>
      <text class="body" x="18" y="145">● API Worker</text><text class="green" x="265" y="145" font-size="13" font-weight="800">Running</text>
      <text class="body" x="18" y="174">● Sync Scheduler</text><text class="green" x="265" y="174" font-size="13" font-weight="800">Running</text>
      <path class="flow" d="M15 198C65 176 102 210 146 190S230 170 337 192"/>
    </g>
  </g>

  <!-- Card 5: Sheets data sync -->
  <g class="card" transform="translate(510 635)">
    <rect width="350" height="190" rx="20" fill="#f7fbfd" stroke="#a9c8dc" stroke-opacity=".35"/>
    <text x="24" y="38" font-family="Inter,Segoe UI,Arial" font-size="17" font-weight="900" fill="#0a1622">Data Sync Sheet</text>
    <text x="24" y="60" font-family="Inter,Segoe UI,Arial" font-size="12" font-weight="600" fill="#6f8ca0">status, membership, spend, dates</text>
    <g transform="translate(24 82)">
      <rect width="302" height="22" fill="#41f1a8" opacity=".92"/><text x="10" y="15" font-size="10" font-weight="900" fill="#021">Name</text><text x="82" y="15" font-size="10" font-weight="900" fill="#021">Status</text><text x="158" y="15" font-size="10" font-weight="900" fill="#021">Joined</text><text x="232" y="15" font-size="10" font-weight="900" fill="#021">Spend</text>
      <g stroke="#d8e3ea"><path d="M0 104H302M0 126H302M0 148H302M0 82H302M72 82V158M144 82V158M220 82V158"/></g>
      <text x="10" y="121" font-size="10" fill="#253642">user_01</text><text x="82" y="121" font-size="10" fill="#253642">active</text><text x="158" y="121" font-size="10" fill="#253642">10/14</text><text x="232" y="121" font-size="10" fill="#253642">$1,080</text>
      <text x="10" y="143" font-size="10" fill="#253642">user_02</text><text x="82" y="143" font-size="10" fill="#253642">trial</text><text x="158" y="143" font-size="10" fill="#253642">04/30</text><text x="232" y="143" font-size="10" fill="#253642">$299</text>
    </g>
  </g>

  <!-- Card 6: code / api -->
  <g class="card" transform="translate(998 655)">
    <rect width="360" height="168" rx="20" fill="#0b1119" stroke="#a9c8dc" stroke-opacity=".18"/>
    <rect width="360" height="34" rx="20" fill="#111a24"/>
    <text class="tiny" x="22" y="22">Overrides.tsx / API Handler</text>
    <text x="22" y="62" font-family="Consolas,monospace" font-size="12" fill="#a9c8dc">const API_URL = '/api/discord/invite'</text>
    <text x="22" y="86" font-family="Consolas,monospace" font-size="12" fill="#41f1a8">await fetch(API_URL, { method: 'POST' })</text>
    <text x="22" y="110" font-family="Consolas,monospace" font-size="12" fill="#ffb557">return redirect(inviteUrl)</text>
    <text x="22" y="134" font-family="Consolas,monospace" font-size="12" fill="#2ea8ff">status: 200, success: true</text>
  </g>

  <!-- Floating tool nodes -->
  <g class="nodeGlow" transform="translate(190 785)"><circle r="18" fill="#2ea8ff"/><text y="6" text-anchor="middle" fill="white" font-size="16">API</text></g>
  <g class="nodeGlow" transform="translate(430 250)"><circle r="18" fill="#41f1a8"/><text y="6" text-anchor="middle" fill="#061" font-size="16">✓</text></g>
  <g class="nodeGlow" transform="translate(1125 82)"><circle r="18" fill="#a9c8dc"/><text y="6" text-anchor="middle" fill="#071623" font-size="16">AI</text></g>
  <g class="nodeGlow" transform="translate(1245 815)"><circle r="18" fill="#ffb557"/><text y="6" text-anchor="middle" fill="#1e1200" font-size="16">{}</text></g>

  <g transform="translate(72 835)">
    <text class="tiny" x="0" y="0">PORTFOLIO VISUAL • no client branding • reusable for hero, project card, or about section</text>
  </g>
</svg>
