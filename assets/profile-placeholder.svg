<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Animated automation and backend systems showcase">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111d"/>
      <stop offset="0.55" stop-color="#071827"/>
      <stop offset="1" stop-color="#0b2236"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#42d7ff" stop-opacity="0.75"/>
      <stop offset="0.45" stop-color="#2b7dff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2b7dff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#5cf2a8" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#5cf2a8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title{font:800 58px Arial,Helvetica,sans-serif;letter-spacing:-1px;fill:#f7fbff}.sub{font:400 22px Arial,Helvetica,sans-serif;fill:#b9cce1}.tiny{font:600 14px Arial,Helvetica,sans-serif;fill:#d9edff}.label{font:700 16px Arial,Helvetica,sans-serif;fill:#eef8ff}.muted{font:500 12px Arial,Helvetica,sans-serif;fill:#8fa9c2}.panel{fill:#0b1724;stroke:#1e3852;stroke-width:1.2;rx:22;filter:url(#softShadow)}.chip{fill:#0e2336;stroke:#2e5474;stroke-width:1}.line{fill:none;stroke:#2b8cff;stroke-width:2.4;stroke-linecap:round;stroke-dasharray:8 12;opacity:.75}.line2{stroke:#54f2b6}.node{filter:url(#neon)}
      @keyframes floatA{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
      @keyframes floatB{0%,100%{transform:translateY(0)}50%{transform:translateY(14px)}}
      @keyframes pulse{0%,100%{opacity:.35;transform:scale(.92)}50%{opacity:1;transform:scale(1.08)}}
      @keyframes dash{to{stroke-dashoffset:-120}}
      @keyframes scan{0%{transform:translateX(-260px);opacity:0}20%,70%{opacity:.65}100%{transform:translateX(520px);opacity:0}}
      @keyframes rise{0%{transform:translateY(40px);opacity:0}20%,80%{opacity:1}100%{transform:translateY(-80px);opacity:0}}
      @keyframes blink{0%,100%{opacity:.35}50%{opacity:1}}
      @keyframes rotate{to{transform:rotate(360deg)}}
      @keyframes flowDot1{0%{offset-distance:0%;opacity:0}12%,88%{opacity:1}100%{offset-distance:100%;opacity:0}}
      .floatA{animation:floatA 5s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.floatB{animation:floatB 6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.pulse{animation:pulse 2.8s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.dash{animation:dash 4s linear infinite}.scan{animation:scan 4.5s ease-in-out infinite}.rise1{animation:rise 5s linear infinite}.rise2{animation:rise 5.8s linear infinite 1s}.blink{animation:blink 2s ease-in-out infinite}.spin{animation:rotate 22s linear infinite;transform-box:fill-box;transform-origin:center}.dotPath{offset-path:path('M 595 400 C 500 330, 430 310, 340 295');animation:flowDot1 3.5s linear infinite}.dotPath2{offset-path:path('M 595 400 C 690 330, 760 300, 850 285');animation:flowDot1 3.8s linear infinite .4s}.dotPath3{offset-path:path('M 595 400 C 480 440, 390 480, 285 545');animation:flowDot1 4s linear infinite .8s}.dotPath4{offset-path:path('M 595 400 C 700 450, 790 500, 910 545');animation:flowDot1 4.2s linear infinite 1.2s}
    </style>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="600" cy="400" r="380" fill="url(#glowBlue)" opacity="0.35"/>
  <circle cx="1040" cy="145" r="250" fill="url(#glowGreen)" opacity="0.22"/>
  <g opacity="0.18">
    <path d="M0 110H1200M0 220H1200M0 330H1200M0 440H1200M0 550H1200M0 660H1200" stroke="#6ea8d8"/>
    <path d="M110 0V800M240 0V800M370 0V800M500 0V800M630 0V800M760 0V800M890 0V800M1020 0V800" stroke="#6ea8d8"/>
  </g>

  <text x="70" y="105" class="title">Automation &amp; Backend Systems</text>
  <text x="74" y="145" class="sub">API integrations, workflows, CRM automations, cloud servers, Discord bots, and AI agents.</text>

  <g class="spin" opacity=".32">
    <circle cx="600" cy="400" r="170" fill="none" stroke="#2b8cff" stroke-width="1.5" stroke-dasharray="5 16"/>
    <circle cx="600" cy="400" r="245" fill="none" stroke="#4ee8ba" stroke-width="1.2" stroke-dasharray="2 18"/>
  </g>

  <path class="line dash" d="M595 400 C500 330 430 310 340 295"/>
  <path class="line line2 dash" d="M595 400 C690 330 760 300 850 285"/>
  <path class="line dash" d="M595 400 C480 440 390 480 285 545"/>
  <path class="line line2 dash" d="M595 400 C700 450 790 500 910 545"/>
  <circle r="7" fill="#42d7ff" class="dotPath node"/>
  <circle r="7" fill="#5cf2a8" class="dotPath2 node"/>
  <circle r="7" fill="#42d7ff" class="dotPath3 node"/>
  <circle r="7" fill="#5cf2a8" class="dotPath4 node"/>

  <g class="floatA">
    <rect x="470" y="275" width="250" height="250" rx="38" fill="#08131f" stroke="#37c6ff" stroke-width="2.5" filter="url(#softShadow)"/>
    <circle cx="595" cy="400" r="85" fill="url(#glowBlue)" class="pulse"/>
    <path d="M603 322 L535 418 H587 L568 480 L663 372 H608 Z" fill="#7bf4ca" filter="url(#neon)"/>
    <text x="595" y="544" text-anchor="middle" class="label">Workflow Hub</text>
  </g>

  <g class="floatB">
    <rect x="115" y="215" width="285" height="160" class="panel"/>
    <rect x="140" y="245" width="74" height="74" rx="18" fill="#14284a" stroke="#416cff"/>
    <path d="M156 286c9-18 33-18 42 0v28h-42z" fill="#6e8cff"/>
    <circle cx="164" cy="279" r="6" fill="#fff"/><circle cx="190" cy="279" r="6" fill="#fff"/>
    <text x="235" y="255" class="label">Discord Bot System</text>
    <text x="235" y="282" class="muted">Commands, roles, logs, member flows</text>
    <rect x="235" y="306" width="135" height="18" rx="9" fill="#10304b"/><rect x="235" y="306" width="102" height="18" rx="9" fill="#2b8cff"/>
    <text x="235" y="345" class="tiny">Status: Online</text><circle cx="358" cy="340" r="6" fill="#5cf2a8" class="blink"/>
  </g>

  <g class="floatA">
    <rect x="755" y="205" width="300" height="175" class="panel"/>
    <text x="785" y="250" class="label">n8n Workflow Automation</text>
    <text x="785" y="276" class="muted">Webhook → API → Logic → CRM</text>
    <g transform="translate(785 305)">
      <rect width="42" height="42" rx="10" fill="#1a3757" stroke="#40d9ff"/><text x="21" y="27" text-anchor="middle" class="tiny">WH</text>
      <path d="M50 21H90" stroke="#5cf2a8" stroke-width="3"/><rect x="96" width="42" height="42" rx="10" fill="#1d3447" stroke="#5cf2a8"/><text x="117" y="27" text-anchor="middle" class="tiny">API</text>
      <path d="M146 21H186" stroke="#5cf2a8" stroke-width="3"/><rect x="192" width="42" height="42" rx="10" fill="#1d3447" stroke="#ffb84d"/><text x="213" y="27" text-anchor="middle" class="tiny">IF</text>
    </g>
    <rect x="785" y="342" width="225" height="8" rx="4" fill="#102840"/><rect x="785" y="342" width="170" height="8" rx="4" fill="#5cf2a8" class="scan"/>
  </g>

  <g class="floatB">
    <rect x="125" y="475" width="320" height="190" class="panel"/>
    <text x="155" y="520" class="label">CRM &amp; Lead Automation</text>
    <text x="155" y="548" class="muted">Pipelines, SMS, email, follow ups</text>
    <rect x="155" y="575" width="75" height="52" rx="12" fill="#10243a" stroke="#30516d"/><text x="193" y="606" text-anchor="middle" class="tiny">New</text>
    <rect x="245" y="575" width="75" height="52" rx="12" fill="#10243a" stroke="#30516d"/><text x="283" y="606" text-anchor="middle" class="tiny">Contacted</text>
    <rect x="335" y="575" width="75" height="52" rx="12" fill="#10243a" stroke="#30516d"/><text x="373" y="606" text-anchor="middle" class="tiny">Won</text>
    <path d="M192 646h180" stroke="#2b8cff" stroke-width="8" stroke-linecap="round"/><path d="M192 646h118" stroke="#5cf2a8" stroke-width="8" stroke-linecap="round" class="pulse"/>
  </g>

  <g class="floatA">
    <rect x="765" y="470" width="320" height="195" class="panel"/>
    <text x="795" y="515" class="label">Cloud Infrastructure</text>
    <text x="795" y="543" class="muted">VPS, uptime, containers, monitoring</text>
    <g transform="translate(805 575)">
      <rect width="110" height="34" rx="9" fill="#11283e" stroke="#294b68"/><circle cx="18" cy="17" r="5" fill="#5cf2a8" class="blink"/><text x="35" y="22" class="tiny">Bot Service</text>
      <rect y="45" width="110" height="34" rx="9" fill="#11283e" stroke="#294b68"/><circle cx="18" cy="62" r="5" fill="#5cf2a8" class="blink"/><text x="35" y="67" class="tiny">API Server</text>
    </g>
    <g transform="translate(955 568)">
      <circle cx="42" cy="42" r="45" fill="url(#glowGreen)" class="pulse"/><text x="42" y="34" text-anchor="middle" fill="#f7fbff" font-family="Arial" font-size="28" font-weight="800">99.9%</text><text x="42" y="58" text-anchor="middle" class="muted">Uptime</text>
    </g>
  </g>

  <g>
    <rect x="525" y="625" width="150" height="52" rx="26" fill="#0e2336" stroke="#3e6c92"/>
    <text x="600" y="657" text-anchor="middle" class="tiny">Secure API Layer</text>
  </g>

  <g opacity=".8">
    <circle cx="1030" cy="130" r="5" fill="#42d7ff" class="rise1"/><circle cx="1068" cy="180" r="4" fill="#5cf2a8" class="rise2"/><circle cx="1010" cy="220" r="3" fill="#42d7ff" class="rise2"/>
    <rect x="0" y="0" width="220" height="800" fill="#fff" opacity=".03" class="scan"/>
  </g>
</svg>
