<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Oracle Cloud Bot Infrastructure</title>
  <desc id="desc">Animated dark themed infrastructure diagram showing Discord bot services hosted on cloud compute with monitoring, database, scheduler, and API worker components.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="70%" cy="20%" r="70%">
      <stop offset="0" stop-color="#123b5f" stop-opacity=".85"/>
      <stop offset=".45" stop-color="#071827" stop-opacity="1"/>
      <stop offset="1" stop-color="#050914" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f1e2d"/>
      <stop offset="1" stop-color="#070b14"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1">
      <stop offset="0" stop-color="#2ed3ff"/>
      <stop offset="1" stop-color="#42f5b6"/>
    </linearGradient>
    <linearGradient id="redline" x1="0" x2="1">
      <stop offset="0" stop-color="#ff4b4b"/>
      <stop offset="1" stop-color="#ff8a3d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".45"/>
    </filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#25465f" stroke-width="1" opacity=".23"/>
      <circle cx="2" cy="2" r="1" fill="#365a73" opacity=".45"/>
    </pattern>
    <style>
      .title{font:800 46px Inter,Segoe UI,Arial,sans-serif;fill:#fff;letter-spacing:-1px}.sub{font:500 17px Inter,Segoe UI,Arial,sans-serif;fill:#b7d2e4}.mini{font:700 12px Inter,Segoe UI,Arial,sans-serif;fill:#d9f5ff}.muted{font:500 11px Inter,Segoe UI,Arial,sans-serif;fill:#7f9cad}.ok{fill:#42f5b6}.warn{fill:#ffb84d}.bad{fill:#ff5757}.card{fill:url(#panel);stroke:#26465d;stroke-width:1.2}.chip{fill:#0d2435;stroke:#245c78}.line{fill:none;stroke:url(#cyan);stroke-width:3;stroke-dasharray:8 13;stroke-linecap:round;filter:url(#glow)}.thin{fill:none;stroke:#39586b;stroke-width:2;stroke-linecap:round}.node{fill:#0b1724;stroke:#2d617a;stroke-width:1.4}.nodeText{font:700 13px Inter,Segoe UI,Arial,sans-serif;fill:#e7faff}.nodeSmall{font:500 10px Inter,Segoe UI,Arial,sans-serif;fill:#8eb2c5}.log{font:500 12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#a7c1d2}.pulse{animation:pulse 2.8s infinite ease-in-out}.float{animation:float 5s infinite ease-in-out}.flowA{animation:dash 5s linear infinite}.flowB{animation:dash 7s linear infinite reverse}@keyframes dash{to{stroke-dashoffset:-140}}@keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    </style>
  </defs>
  <rect width="1200" height="720" fill="url(#bgGlow)"/>
  <rect width="1200" height="720" fill="url(#grid)" opacity=".8"/>
  <circle cx="935" cy="128" r="210" fill="#1a76bd" opacity=".12"/>
  <circle cx="540" cy="625" r="310" fill="#38e2c1" opacity=".08"/>

  <g transform="translate(62 54)">
    <text class="title">Oracle Cloud Bot Infrastructure</text>
    <text class="sub" y="38">Cloud-hosted Discord bot stack with workers, API services, sync jobs, and uptime monitoring.</text>
    <g transform="translate(0 70)">
      <rect class="chip" rx="18" width="128" height="36"/><text class="mini" x="21" y="23">Ubuntu VPS</text>
      <rect class="chip" x="144" rx="18" width="116" height="36"/><text class="mini" x="168" y="23">Docker</text>
      <rect class="chip" x="276" rx="18" width="126" height="36"/><text class="mini" x="297" y="23">Systemd</text>
      <rect class="chip" x="418" rx="18" width="112" height="36"/><text class="mini" x="445" y="23">Logs</text>
    </g>
  </g>

  <!-- central cloud / compute -->
  <g class="float" transform="translate(470 180)" filter="url(#shadow)">
    <path d="M95 95c-28 0-50-20-50-46 0-24 19-44 44-46C101-21 136-32 166-15c21 12 33 34 31 57 25 3 44 23 44 49 0 28-23 50-54 50H95z" fill="#0d1f32" stroke="#2ed3ff" stroke-width="2"/>
    <path d="M95 95c-28 0-50-20-50-46 0-24 19-44 44-46C101-21 136-32 166-15c21 12 33 34 31 57 25 3 44 23 44 49" fill="none" stroke="url(#redline)" stroke-width="5" opacity=".75"/>
    <text class="nodeText" x="83" y="62">Cloud Compute</text>
    <text class="nodeSmall" x="96" y="82">Instance Pool</text>
  </g>

  <!-- node cards -->
  <g filter="url(#shadow)">
    <g transform="translate(86 190)">
      <rect class="card" rx="18" width="260" height="138"/>
      <circle cx="36" cy="40" r="15" fill="#5865f2"/><text class="mini" x="64" y="44">Discord Gateway</text>
      <text class="muted" x="26" y="72">Events, commands, member updates</text>
      <rect x="26" y="92" width="96" height="18" rx="9" fill="#112c40"/><circle cx="40" cy="101" r="4" class="ok pulse"/><text class="muted" x="52" y="105">Connected</text>
    </g>
    <g transform="translate(86 408)">
      <rect class="card" rx="18" width="260" height="162"/>
      <text class="mini" x="26" y="36">Journal Log Channel</text>
      <text class="log" x="26" y="68">INFO bot-service ready</text>
      <text class="log" x="26" y="92">POST /sync/member 200</text>
      <text class="log" x="26" y="116">worker queue processed</text>
      <text class="log" x="26" y="140">heartbeat OK 99.9%</text>
    </g>
    <g transform="translate(442 434)">
      <rect class="card" rx="18" width="300" height="136"/>
      <text class="mini" x="26" y="36">Bot Services</text>
      <text class="muted" x="26" y="68">• command handler</text><text class="ok" x="224" y="68" font-size="12" font-weight="700">Running</text>
      <text class="muted" x="26" y="96">• background worker</text><text class="ok" x="224" y="96" font-size="12" font-weight="700">Running</text>
      <text class="muted" x="26" y="124">• sync scheduler</text><text class="ok" x="224" y="124" font-size="12" font-weight="700">Running</text>
    </g>
    <g transform="translate(812 180)">
      <rect class="card" rx="18" width="300" height="164"/>
      <text class="mini" x="26" y="38">Database + Config</text>
      <text class="muted" x="26" y="72">Secrets, channel maps, user state</text>
      <rect x="28" y="98" width="244" height="40" rx="12" fill="#081522" stroke="#25465d"/>
      <text class="log" x="46" y="123">config.json • tokens hidden</text>
    </g>
    <g transform="translate(812 410)">
      <rect class="card" rx="18" width="300" height="160"/>
      <text class="mini" x="26" y="36">System Monitoring</text>
      <g transform="translate(26 60)"><text class="muted">CPU</text><text class="mini" x="128">24%</text><path d="M0 34c22-20 44 12 68-5s39-5 64-22" class="thin" stroke="#42f5b6"/></g>
      <g transform="translate(26 108)"><text class="muted">Uptime</text><text class="mini" x="128">99.9%</text><path d="M0 34c25-4 42-2 58-13s37 9 74-12" class="thin" stroke="#2ed3ff"/></g>
    </g>
  </g>

  <!-- mini flow nodes -->
  <g transform="translate(378 302)">
    <rect class="node" rx="14" width="104" height="68"/><text class="nodeText" x="27" y="30">API</text><text class="nodeSmall" x="20" y="50">FastAPI / Flask</text>
  </g>
  <g transform="translate(548 302)">
    <rect class="node" rx="14" width="104" height="68"/><text class="nodeText" x="22" y="30">Worker</text><text class="nodeSmall" x="17" y="50">Queue Jobs</text>
  </g>
  <g transform="translate(718 302)">
    <rect class="node" rx="14" width="104" height="68"/><text class="nodeText" x="21" y="30">Sync</text><text class="nodeSmall" x="14" y="50">Sheets / CRM</text>
  </g>

  <!-- connections -->
  <path class="line flowA" d="M346 258 C390 258 402 302 430 302"/>
  <path class="line flowA" d="M482 336 C510 336 520 336 548 336"/>
  <path class="line flowA" d="M652 336 C680 336 690 336 718 336"/>
  <path class="line flowA" d="M822 336 C860 314 860 284 812 256"/>
  <path class="line flowB" d="M600 324 C608 260 610 230 580 190"/>
  <path class="line flowB" d="M600 370 C610 410 612 430 590 434"/>
  <path class="line flowB" d="M742 370 C792 404 806 450 812 490"/>
  <path class="line flowB" d="M378 352 C320 390 286 412 346 470"/>

  <!-- bottom summary -->
  <g transform="translate(68 626)">
    <rect x="0" y="0" width="1064" height="54" rx="24" fill="#07111d" stroke="#23465d"/>
    <text class="mini" x="30" y="33">Flow:</text>
    <text class="sub" x="78" y="34">Discord Event → Cloud Bot Service → API Worker → Data Sync → Logs + Monitoring</text>
    <circle cx="1018" cy="27" r="9" class="ok pulse"/>
  </g>
</svg>
